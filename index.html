<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBR PureField</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- Top Frozen Navigation Bar -->
    <nav class="freeze-navbar">
        <div class="nav-container">
            <!-- Clickable Logo Target Area -->
            <a href="#" onclick="resetToHome(event)" class="brand-logo">
                <div class="logo-nbr">NBR</div>
                <div class="logo-purefield">PureField</div>
            </a>
            
            <!-- Centered Navigation Panes -->
            <ul class="nav-links">
                <li><a href="#" onclick="filterCategory('all')" class="active" id="pane-home">Home</a></li>
                <li><a href="#" onclick="filterCategory('all')">Organic Food</a></li>
                <li><a href="#">Track Your Order</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>

            <!-- Search Mechanism Area -->
            <div class="nav-search-right">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search fresh harvest...">
                </div>
            </div>
        </div>
    </nav>

    <!-- Content Framework Layout -->
    <main class="storefront-container">
        
        <!-- Interactive Catalog Segment -->
        <section class="catalog-segment">
            <div class="products-grid" id="products-container">
                <!-- Advanced interactive product blocks inject here -->
            </div>
        </section>

        <!-- Right Checkout Basket Panel -->
        <aside class="basket-panel" id="cart-box">
            <h3>Your Sunday Basket</h3>
            <div id="cart-items" class="empty-basket-text">Your basket is waiting for fresh harvest items...</div>
            <div class="total-row">
                <span>Subtotal</span>
                <strong>₹<span id="cart-total">0</span></strong>
            </div>
            <p id="delivery-note" class="delivery-status-text">Add items to view parameters</p>
            <button onclick="openVerificationModal()" id="checkout-btn" class="primary-checkout-btn" disabled>Lock In My Sunday Slot</button>
        </aside>

    </main>

    <!-- Verification Modal Context Window -->
    <div id="otp-modal" class="modal-backdrop">
        <div class="modal-surface">
            <span class="modal-close-x" onclick="closeVerificationModal()">&times;</span>
            <div class="modal-interior">
                <h3>Secure Booking Verification</h3>
                <p>Please log details to route your Sunday dispatch.</p>
                <div id="phone-input-view">
                    <input type="text" id="cust-name" placeholder="Enter Full Name" class="form-field"><br><br>
                    <input type="tel" id="phone-number" value="+91" class="form-field">
                    <div id="recaptcha-container"></div>
                    <button class="form-submit-btn" onclick="sendSMSOTP()">Send Verification Code</button>
                </div>
                <div id="otp-input-view" style="display: none;">
                    <input type="text" id="otp-code" placeholder="Enter 6-digit OTP" class="form-field"><br><br>
                    <button class="form-submit-btn verify" onclick="verifyCodeAndSave()">Confirm & Order via UPI</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
